version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # NOTE: uv does not support dependency-type (prod/dev split) yet.
    # See https://github.com/dependabot/dependabot-core/issues/13202
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
      major:
        patterns: ["*"]
        update-types:
          - "major"
      security:
        applies-to: "security-updates"
        patterns: ["*"]
    cooldown:
      default-days: 3
      semver-major-days: 7
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
      major:
        patterns: ["*"]
        update-types:
          - "major"
      security:
        applies-to: "security-updates"
        patterns: ["*"]
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5
